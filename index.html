<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <script src="./javascript.js" defer></script>
    <title>Document</title>
</head>

<body>
    <div class="grid-container grid-hcenter">
        <div class="grid-container book-list"></div>
    </div>

    <button class="add-book">Add new book</button>

    <dialog id="book-dialog">
        <form>
            <p>
                <label for="author">Enter author: </label>
                <input type="text" id="author">
            </p>

            <p>
                <label for="title">Enter title: </label>
                <input type="text" id="title">
            </p>

            <p>
                <label for="pages">Enter number of pages: </label>
                <input type="number" id="pages"> 
            </p>

            <p>
                <label for="read-status">Has been read:</label>
                <select name="read" id="read-status">
                    <option value="true">I read it!</option>
                    <option value="false">I haven't read it</option>
                </select>
            </p>
            <div>
                <button id="closeDialog" value="cancel" formmethod="dialog">Cancel</button>
                <button id="confirmBtn" value="default">Confirm</button>
            </div>
        </form>
    </dialog>

    <output></output>
</body>

</html>
